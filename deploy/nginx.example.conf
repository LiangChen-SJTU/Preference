# camp.genviewtech.com — Nginx 示例配置
# 复制到服务器后按实际路径修改，例如：
#   sudo cp deploy/nginx.example.conf /etc/nginx/sites-available/camp.genviewtech.com
#   sudo ln -s /etc/nginx/sites-available/camp.genviewtech.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL 证书请放在服务器本地（勿提交到 Git），例如：
#   /etc/nginx/ssl/camp.genviewtech.com/fullchain.pem
#   /etc/nginx/ssl/camp.genviewtech.com/privkey.pem

upstream preference_app {
    server 127.0.0.1:3000;
    keepalive 8;
}

server {
    listen 80;
    server_name camp.genviewtech.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name camp.genviewtech.com;

    ssl_certificate     /etc/nginx/ssl/camp.genviewtech.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/camp.genviewtech.com/privkey.pem;

    # 静态资源（npm run build 产物）
    root /var/www/camp.genviewtech.com/dist;
    index index.html;

    location / {
        try_files $uri $uri/ @app;
    }

    # API 与动态数据由 Node.js 处理
    location /api/ {
        proxy_pass http://preference_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @app {
        proxy_pass http://preference_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
