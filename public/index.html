<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课题志愿收集系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>课题志愿收集系统</h1>
      <p class="subtitle">30 名用户 · 6 个课题 · 每课题 5 人</p>
    </header>

    <section class="progress-card" id="progressCard">
      <div class="progress-info">
        <span class="progress-label">已填写</span>
        <span class="progress-count"><strong id="filledCount">0</strong> / <span id="maxCount">30</span></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-hint" id="progressHint">填写完成后系统将自动分配课题</p>
    </section>

    <main class="main-grid">
      <section class="card form-card">
        <h2 id="formTitle">填写志愿</h2>

        <div class="form-group">
          <label for="userName">姓名</label>
          <input type="text" id="userName" placeholder="请输入您的姓名" maxlength="20" autocomplete="name">
        </div>

        <div class="form-group">
          <label>志愿顺序（第 1 志愿为最优先）</label>
          <div class="preference-list" id="preferenceList"></div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-primary" id="submitBtn">提交志愿</button>
          <button type="button" class="btn btn-secondary" id="loadBtn">加载我的志愿</button>
        </div>

        <p class="form-message" id="formMessage"></p>
      </section>

      <section class="card side-card">
        <h2>已提交名单</h2>
        <ul class="name-list" id="nameList">
          <li class="empty-hint">暂无提交</li>
        </ul>
      </section>
    </main>

    <section class="card result-card hidden" id="resultCard">
      <h2>分配结果</h2>
      <div class="summary-grid" id="summaryGrid"></div>
      <div class="result-table-wrap">
        <table class="result-table" id="resultTable">
          <thead>
            <tr>
              <th>姓名</th>
              <th>分配课题</th>
              <th>满足志愿</th>
              <th>原始志愿</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>
      <div class="topic-stats" id="topicStats"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
